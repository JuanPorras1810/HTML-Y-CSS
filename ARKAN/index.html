<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARKAN</title>
  <link rel="stylesheet" href="css/style.css">
  <script defer src="js/arkan.js"></script>
</head>

<body>
  <div class="arcade-cabinet">
    <div class="title-banner">
      <canvas id="titleCanvas" width="448" height="100"></canvas>
    </div>

    <div class="main-layout">
      <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        <button id="replayBtn" class="btn-replay">NEW GAME</button>
      </div>

      <div class="ranking-panel">
        <h3>TOP SCORE</h3>
        <ul id="rankingList" class="ranking-list"></ul>
      </div>
    </div>

    <div class="arcade-footer">INSERT COIN - NEON MODE</div>
  </div>

  <img hidden id="sprite" src="img/sprite.png" alt="Sprite Arkanoid" />

</body>

</html>
